<!DOCTYPE html>
<html>

<head>
<title>SuperMart</title>
<link rel="stylesheet" href="style.css">
<style>
  /* ===== NAV RIGHT - single line fix ===== */
  .nav-right {
    display: flex !important;
    flex-direction: row !important;
    align-items: center !important;
    flex-wrap: nowrap !important;
    gap: 10px !important;
  }

  /* ===== LOGIN / SIGNUP NAVBAR BUTTONS ===== */
  .auth-buttons {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .btn-login {
    padding: 8px 18px;
    border: 2px solid #ff6a00;
    color: #ff6a00;
    border-radius: 20px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    background: transparent;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn-login:hover {
    background-color: #ff6a00;
    color: white;
  }

  .btn-signup {
    padding: 8px 18px;
    background-color: #ff6a00;
    color: white;
    border-radius: 20px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    border: 2px solid #ff6a00;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn-signup:hover {
    background-color: #e05a00;
    border-color: #e05a00;
  }
</style>
</head>

<body>

<header>
<div class="navbar">

  <div class="logo">SuperMart</div>

  <nav>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </nav>

  <div class="nav-right">

    <input type="text" id="topSearchBar"
      placeholder="Search products..."
      class="search-box">

    <!-- ✅ LOGIN / SIGNUP BUTTONS - Search k baad, Cart se pehle -->
    <div class="auth-buttons">
      <a href="login.html" class="btn-login">Login</a>
      <a href="signup.html" class="btn-signup">Sign Up</a>
    </div>

    <button class="cart-btn" onclick="toggleCart()">
      🛒 Cart <span id="cart-count">0</span>
    </button>

    <div id="cart-dropdown" class="cart-dropdown"></div>

  </div>

</div>
</header>

<!-- Hero Section -->
<div class="deal">
  <h2>🔥 Deal of the Day</h2>
  <h1 id="deal-timer">00 : 00 : 00</h1>
</div>

<section class="hero">
  <div class="hero-content">
    <h1>Fresh Grocery Delivered</h1>
    <p>Best quality products at best price</p>
  </div>
</section>

<!-- BIG SEARCH -->
<div class="big-search">
  <input type="text" id="bigSearchBar"
    placeholder="Search for groceries...">
</div>

<!-- Categories -->
<div class="categories">
  <button class="category-btn active" data-category="all">All</button>
  <button class="category-btn" data-category="vegetable">🥦 Vegetables</button>
  <button class="category-btn" data-category="fruit">🍎 Fruits</button>
  <button class="category-btn" data-category="dairy">🥛 Dairy</button>
  <button class="category-btn" data-category="grocery">🍚 Grocery</button>
</div>

<!-- SHOP LAYOUT -->
<div class="shop-layout">

  <div class="products-section">
    <h2 class="section-title">Products</h2>
    <div class="products" id="product-list"></div>
  </div>

  <div class="recommend-section">
    <h3>You May Also Like</h3>
    <div class="recommendations" id="recommend-list"></div>
  </div>

</div>

<!-- Cart Sidebar -->
<div id="cartSidebar" class="cart-sidebar">

  <div class="cart-header">
    <h3>Your Cart</h3>
    <button onclick="toggleCart()">✖</button>
  </div>

  <div id="cart-items"></div>

  <div class="cart-footer">
    <h4>Total: ₹ <span id="cart-total">0</span></h4>
    <button onclick="payNow()" class="checkout-btn">Pay Now</button>
  </div>

</div>

<!-- Razorpay Script -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script src="script.js"></script>


</body>
</html>
